name: package-full-audit-source

on:
  pull_request:
    branches: [ACRIS]
    paths:
      - ".github/workflows/package-netlify-source.yml"
  pull_request:
    branches: [ACRIS]
    paths:
      - "netlify.toml"
      - "skyline/frontend/**"
      - ".github/workflows/package-netlify-source.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Package exact repository source
        uses: actions/upload-artifact@v4
        with:
          name: buyerdb-full-audit-${{ github.sha }}
          path: .
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
