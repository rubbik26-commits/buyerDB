name: daily-incremental-manual-fallback

# Manual emergency fallback only. Production scraper scheduling must not consume
# GitHub Actions minutes. The canonical production schedule runs outside GitHub.
on:
  workflow_dispatch:

concurrency:
  group: skyline-incremental-manual
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    working-directory: skyline

jobs:
  incremental:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL || secrets.DATABASE_URL }}
      SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
      SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Require database connection secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Neither SUPABASE_DB_URL nor DATABASE_URL is set."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install worker dependencies
        run: pip install -r requirements.txt

      - name: Run proven Traded incremental ingest
        run: python -m worker.run_incremental

      - name: Run proven ACRIS fresh-window ingest
        run: python -m worker.phase3_fresh

      - name: Run Rolling Sales enrichment
        run: python -m worker.rolling_sales --batch 400

      - name: Verify production invariants
        working-directory: ..
        run: |
          python - <<'PY'
          import os, psycopg
          conn = psycopg.connect(os.environ["DATABASE_URL"])
          checks = {
              "duplicate_property_price_date": "select count(*) from (select property_id,sale_price,sale_date,count(*) from sbi_deals group by property_id,sale_price,sale_date having count(*)>1) x",
              "acris_parties_without_gate": "select count(*) from sbi_deal_parties dp join sbi_deals d using(deal_id) where dp.source_system='acris' and dp.role in ('buyer','seller') and coalesce(dp.amount_gate_passed,false) is not true",
              "banned_asset_rows": "select count(*) from sbi_deals where asset_type in ('Condo','Commercial Condo','Co-op','Single Family','Two Family','1-2 Family')",
          }
          with conn, conn.cursor() as cur:
              for name, sql in checks.items():
                  cur.execute(sql)
                  failures = cur.fetchone()[0]
                  print(name, failures)
                  if failures:
                      raise SystemExit(f"{name} failed: {failures}")
          PY
