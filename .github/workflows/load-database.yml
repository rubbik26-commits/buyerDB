name: load-database

# Manual one-shot: apply migrations and load the canonical dataset into the live
# sbi_* production schema. Use SUPABASE_DB_URL or DATABASE_URL with the Supabase
# session-pooler URI. Safe to re-run: it refuses to load over non-empty sbi_deals
# unless force_reload=true is explicitly selected.
on:
  workflow_dispatch:
    inputs:
      force_reload:
        description: "Wipe sbi_* tables and reload from the CSV"
        type: boolean
        default: false

defaults:
  run:
    working-directory: skyline

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL || secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Require database connection secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Neither SUPABASE_DB_URL nor DATABASE_URL is set. Add one under Settings → Secrets and variables → Actions → New repository secret. Use the SESSION POOLER connection string from the Supabase dashboard Connect button."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Apply migrations
        run: |
          for f in database/migrations/*.sql; do
            echo "== $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Load canonical CSV into sbi schema
        run: |
          N=$(psql "$DATABASE_URL" -Atc "SELECT count(*) FROM sbi_deals")
          if [ "${{ inputs.force_reload }}" = "true" ]; then
            python scripts/migrate_csv_sbi.py NEW_YORK_CLOSED_ENRICHED_v8.csv exclusion_ledger_additions_2026-07-02.csv --reset
          elif [ "$N" != "0" ]; then
            echo "sbi_deals already has $N rows — skipping load."
          else
            python scripts/migrate_csv_sbi.py NEW_YORK_CLOSED_ENRICHED_v8.csv exclusion_ledger_additions_2026-07-02.csv
          fi

      - name: Assertions
        run: |
          python - <<'PY'
          import os, psycopg2
          conn = psycopg2.connect(os.environ['DATABASE_URL'])
          cur = conn.cursor()
          cur.execute('select count(*) from sbi_deals')
          deals = cur.fetchone()[0]
          cur.execute('select count(*) from sbi_properties')
          props = cur.fetchone()[0]
          cur.execute('select count(*) from sbi_entities')
          ents = cur.fetchone()[0]
          print({'sbi_deals': deals, 'sbi_properties': props, 'sbi_entities': ents})
          if deals <= 0 or props <= 0 or ents <= 0:
              raise SystemExit('load failed: sbi tables are still empty')
          PY
