name: deploy-frontend

# MIRROR deploy: production is buyerdb.netlify.app (Netlify builds from this
# repo via netlify.toml). This publishes the same bundle to GitHub Pages at
# https://rubbik26-commits.github.io/buyerDB/ as a fallback URL by pushing the
# build output to the gh-pages branch (Pages serves that branch; this avoids
# the Pages API, which workflow tokens are not allowed to call on this repo).
# The build points VITE_API_URL at the Supabase project, so the client runs in
# RPC mode (PostgREST api_* functions from migration 004) — no separate backend
# host needed for the data tabs. When the FastAPI backend is deployed later,
# change VITE_API_URL to its URL and the same client switches to full mode.
on:
  workflow_dispatch:
  push:
    branches: [ACRIS]
    paths: ["skyline/frontend/**", ".github/workflows/deploy-frontend.yml"]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build (RPC mode, served under /buyerDB/)
        working-directory: skyline/frontend
        env:
          VITE_API_URL: https://hvsvxjdwfbsqaqlmuwlt.supabase.co
        run: |
          npm ci
          npx vite build --base=/buyerDB/
      - name: Publish dist to gh-pages branch
        working-directory: skyline/frontend/dist
        run: |
          touch .nojekyll
          cp index.html 404.html   # SPA deep links: Pages has no rewrite rule, 404.html is the fallback
          git init -b gh-pages
          git config user.name "skyline-bot"
          git config user.email "bot@skyline.local"
          git add -A
          git commit -m "Deploy frontend $(date -u +%FT%TZ) from ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
