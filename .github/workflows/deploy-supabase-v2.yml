name: verify-live-sbi-production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type VERIFY_LIVE_SBI to run live Supabase SBI integrity checks"
        required: true
        type: string
      run_python_worker_smoke:
        description: "Run the proven Python worker smoke paths against the live DB if DATABASE_URL is configured"
        required: true
        default: false
        type: boolean

concurrency:
  group: verify-live-sbi-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'pdvyuepsdnpxctmagdcq' }}
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL || secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://pdvyuepsdnpxctmagdcq.supabase.co' }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
      SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
    steps:
      - name: Confirm verification window
        run: |
          if [ "${{ inputs.confirm }}" != "VERIFY_LIVE_SBI" ]; then
            echo "::error::Confirmation text mismatch."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Require live database secret for direct DB checks
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Missing SUPABASE_DB_URL or DATABASE_URL. Add the Supabase session-pooler connection string as a repository secret."
            exit 1
          fi

      - name: Install psql
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Verify live SBI schema, data, invariants, and RPC contract
        run: bash execution/verify_live_sbi.sh

      - name: Python worker smoke test against live DB
        if: ${{ inputs.run_python_worker_smoke }}
        working-directory: skyline
        run: |
          python -m pip install -r requirements.txt
          python -m worker.run_requested || true
          python -m worker.phase3_fresh --limit 10
          python -m worker.rolling_sales --batch 10
