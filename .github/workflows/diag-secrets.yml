# Temporary diagnostic: prints which secret/variable NAMES are visible to
# Actions in this repo (values are masked by the runner). Used to locate a
# DATABASE_URL that was saved but never reaches the worker workflows.
# Delete this file once the secret is confirmed.
name: diag-secrets
on: workflow_dispatch

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Show visible secret and variable names
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
          VARS_JSON: ${{ toJSON(vars) }}
        run: |
          echo "== secret names visible to this workflow =="
          echo "$SECRETS_JSON" | python3 -c "import json,sys; print('\n'.join(sorted(json.load(sys.stdin).keys())))"
          echo "== variable names visible to this workflow =="
          echo "$VARS_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print('\n'.join(sorted(d.keys())) if d else '(none)')"
          echo "== direct checks =="
          echo "secrets.DATABASE_URL set: ${{ secrets.DATABASE_URL != '' }}"
          echo "vars.DATABASE_URL set:    ${{ vars.DATABASE_URL != '' }}"
