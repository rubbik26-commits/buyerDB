name: sbi-acris-refresh

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum ACRIS master rows to process"
        required: false
        default: "250"
      days:
        description: "Recorded-date lookback window"
        required: false
        default: "120"
  schedule:
    - cron: "12 6 * * *"

concurrency:
  group: sbi-acris-refresh
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-acris-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://pdvyuepsdnpxctmagdcq.supabase.co' }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      LIMIT: ${{ github.event.inputs.limit || '250' }}
      DAYS: ${{ github.event.inputs.days || '120' }}
    steps:
      - name: Require Supabase anon key
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing SUPABASE_ANON_KEY repository secret."
            exit 1
          fi

      - name: Create auditable scraper run row
        id: request
        run: |
          set -euo pipefail
          body=$(jq -n --arg job "acris_refresh" --arg user_id "github-actions" --argjson limit "$LIMIT" --argjson days "$DAYS" '{job:$job,user_id:$user_id,options:{limit:$limit,days:$days}}')
          curl -fsS -X POST "$SUPABASE_URL/rest/v1/rpc/api_request_scrape" \
            -H 'Content-Type: application/json' \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -d "$body" | tee /tmp/request.json
          run_id=$(jq -r '.run_id' /tmp/request.json)
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "::error::api_request_scrape did not return run_id"
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Invoke live Supabase ACRIS scraper function
        run: |
          set -euo pipefail
          body=$(jq -n --arg run_id "${{ steps.request.outputs.run_id }}" --argjson limit "$LIMIT" --argjson days "$DAYS" '{run_id:$run_id,limit:$limit,days:$days}')
          curl -fsS -X POST "$SUPABASE_URL/functions/v1/sbi-acris-refresh" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -d "$body" | tee /tmp/acris-refresh.json
          jq -e '.ok == true or .status == "completed_with_errors"' /tmp/acris-refresh.json >/dev/null

      - name: Show scraper summary
        if: always()
        run: |
          test -f /tmp/acris-refresh.json && cat /tmp/acris-refresh.json || true
