name: requested-scraper-runs

# Claims manual scraper requests created from the Scrapers tab.
# This keeps the UI honest: button clicks create durable requested rows, and this
# worker turns those rows into actual ingestion/enrichment runs.
on:
  workflow_dispatch:
    inputs:
      job:
        description: "Optional job type to claim: traded_refresh, acris_refresh, property_owner_refresh, or full_refresh"
        required: false
        type: string
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: skyline-requested-scraper-runs
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    working-directory: skyline

jobs:
  requested:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_REQUESTED_SCRAPER_WORKER == 'true'
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL || secrets.DATABASE_URL }}
      SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
      SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Require database connection secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Neither SUPABASE_DB_URL nor DATABASE_URL is set. Use the Supabase session-pooler connection string."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install worker deps
        run: pip install -r requirements.txt

      - name: Claim and run one requested scraper job
        run: |
          if [ -n "${{ inputs.job }}" ]; then
            python -m worker.run_requested --job "${{ inputs.job }}"
          else
            python -m worker.run_requested
          fi
