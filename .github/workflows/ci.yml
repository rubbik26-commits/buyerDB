name: ci

on:
  push:
    branches: [main, ACRIS]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    working-directory: skyline

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: skyline
          POSTGRES_PASSWORD: skyline_dev
          POSTGRES_DB: skyline
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://skyline:skyline_dev@localhost:5432/skyline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Extensions + schema
        run: |
          psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm; CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          psql "$DATABASE_URL" -c "CREATE ROLE anon NOLOGIN; CREATE ROLE authenticated NOLOGIN; CREATE ROLE service_role NOLOGIN;"
          for f in database/migrations/*.sql; do
            echo "== $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Load canonical dataset
        run: |
          python scripts/migrate_csv.py NEW_YORK_CLOSED_ENRICHED_v8.csv exclusion_ledger_additions_2026-07-02.csv
          python scripts/assert_migration.py NEW_YORK_CLOSED_ENRICHED_v8.csv
      - name: Backend + worker tests
        run: python -m pytest worker/test_store.py backend/tests worker/test_run_incremental.py worker/test_phase2_enrichment.py worker/test_phase3_fresh.py worker/test_rolling_sales.py -q
      - name: Frontend build
        working-directory: skyline/frontend
        run: |
          npm install
          npm run build
          ! grep -rqiE "sk-[A-Za-z0-9]{16,}|gsk_[A-Za-z0-9]{16,}|postgres(ql)?://|service_role|sb_secret_" dist/ || (echo "SECRET IN BUNDLE" && exit 1)

  seed-live-sbi:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    env:
      LIVE_DATABASE_URL: ${{ secrets.SUPABASE_DB_URL || secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check live database secret
        run: |
          if [ -z "$LIVE_DATABASE_URL" ]; then
            echo "No SUPABASE_DB_URL or DATABASE_URL secret present; skipping live sbi seed."
            exit 0
          fi
      - name: Install loader dependencies
        if: env.LIVE_DATABASE_URL != ''
        working-directory: skyline
        run: pip install -r requirements.txt
      - name: Seed live sbi database
        if: env.LIVE_DATABASE_URL != ''
        working-directory: skyline
        env:
          DATABASE_URL: ${{ env.LIVE_DATABASE_URL }}
        run: python scripts/migrate_csv_sbi.py NEW_YORK_CLOSED_ENRICHED_v8.csv exclusion_ledger_additions_2026-07-02.csv
      - name: Verify live sbi rows
        if: env.LIVE_DATABASE_URL != ''
        working-directory: skyline
        env:
          DATABASE_URL: ${{ env.LIVE_DATABASE_URL }}
        run: |
          python - <<'PY'
          import os, psycopg2
          conn = psycopg2.connect(os.environ['DATABASE_URL'])
          cur = conn.cursor()
          cur.execute('select count(*) from sbi_deals')
          deals = cur.fetchone()[0]
          cur.execute('select count(*) from sbi_properties')
          props = cur.fetchone()[0]
          print({'sbi_deals': deals, 'sbi_properties': props})
          if deals <= 0 or props <= 0:
              raise SystemExit('live sbi seed failed: tables are still empty')
          PY
