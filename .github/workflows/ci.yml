name: ci

on:
  push:
    branches: [ACRIS]
  pull_request:
    branches: [ACRIS]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: buyerdb-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: skyline
          POSTGRES_PASSWORD: skyline_dev
          POSTGRES_DB: skyline
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://skyline:skyline_dev@localhost:5432/skyline
    defaults:
      run:
        working-directory: skyline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: skyline/requirements.txt
      - run: pip install -r requirements.txt
      - name: Apply the Python worker schema
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f database/migrations/001_schema.sql
      - name: Load canonical dataset
        id: migration_load
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/migrate_csv.py NEW_YORK_CLOSED_ENRICHED_v8.csv exclusion_ledger_additions_2026-07-02.csv 2>&1 | tee /tmp/migrate.log
      - name: Assert canonical migration
        id: migration_assert
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/assert_migration.py NEW_YORK_CLOSED_ENRICHED_v8.csv 2>&1 | tee /tmp/assert-migration.log
      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-diagnostics
          path: |
            /tmp/migrate.log
            /tmp/assert-migration.log
          if-no-files-found: error
      - name: Fail when canonical migration fails
        if: steps.migration_load.outcome != 'success' || steps.migration_assert.outcome != 'success'
        run: exit 1
      - name: Test proven worker invariants
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            worker/test_store.py \
            worker/test_run_incremental.py \
            worker/test_phase2_enrichment.py \
            worker/test_phase3_fresh.py \
            worker/test_rolling_sales.py \
            -q 2>&1 | tee /tmp/worker-tests.log
      - name: Test backend provider and tool services
        id: backend_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest backend/tests -q 2>&1 | tee /tmp/backend-tests.log
      - name: Upload backend test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-diagnostics
          path: |
            /tmp/worker-tests.log
            /tmp/backend-tests.log
          if-no-files-found: warn
      - name: Fail when backend tests fail
        if: steps.backend_tests.outcome != 'success'
        run: exit 1

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: skyline/frontend
    env:
      VITE_API_URL: https://pdvyuepsdnpxctmagdcq.supabase.co
      VITE_USE_SUPABASE_RPC: "true"
      VITE_SUPABASE_ANON_KEY: sb_publishable_UjrNaspF-2DWK9RFYmX1Zw_1Ju8nT2w
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skyline/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Prove no server secret was bundled
        run: >-
          ! grep -rqiE
          "sk-[A-Za-z0-9]{16,}|gsk_[A-Za-z0-9]{16,}|postgres(ql)?://|SUPABASE_SERVICE_ROLE_KEY|SUPABASE_SERVICE_KEY|sb_secret_|SCRAPERAPI_KEY|APIFY_TOKEN|ANTHROPIC_API_KEY|OPENAI_API_KEY"
          dist/
          || (echo "SERVER SECRET FOUND IN FRONTEND BUNDLE" && exit 1)

  live-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify live Supabase RPC health
        run: |
          curl -fsS -X POST "https://pdvyuepsdnpxctmagdcq.supabase.co/rest/v1/rpc/api_health" \
            -H "apikey: sb_publishable_UjrNaspF-2DWK9RFYmX1Zw_1Ju8nT2w" \
            -H "Authorization: Bearer sb_publishable_UjrNaspF-2DWK9RFYmX1Zw_1Ju8nT2w" \
            -H "Content-Type: application/json" -d '{}' | tee /tmp/health.json
          jq -e '.status == "ok" and .runtime == "supabase-rpc-sbi" and .deals > 0' /tmp/health.json
      - name: Verify database-backed buyer recommendation query
        run: |
          curl -fsS -X POST "https://pdvyuepsdnpxctmagdcq.supabase.co/rest/v1/rpc/api_similar_buyers" \
            -H "apikey: sb_publishable_UjrNaspF-2DWK9RFYmX1Zw_1Ju8nT2w" \
            -H "Authorization: Bearer sb_publishable_UjrNaspF-2DWK9RFYmX1Zw_1Ju8nT2w" \
            -H "Content-Type: application/json" \
            -d '{"asset_type":"Multifamily","borough":"Brooklyn","price":3000000,"keywords":[],"lim":10}' | tee /tmp/buyers.json
          jq -e '(.candidates | length) > 0 and .criteria.borough == "Brooklyn" and .criteria.asset_type == "Multifamily"' /tmp/buyers.json
