name: temporary-publish

on:
  push:
    branches: [ACRIS]
    paths:
      - ".github/workflows/temporary-publish.yml"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bash scripts/direct_netlify_publish.sh
