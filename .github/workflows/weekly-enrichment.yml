name: weekly-enrichment

# LEGACY FALLBACK (decisions D-008/D-010) — gated like daily-incremental on the
# ENABLE_LEGACY_WORKER repo variable; workflow_dispatch always works.
# Sunday ~06:43 ET. Closes the 7–8 week ACRIS party-recording lag as the window
# rolls forward: phase2 matches missing parties, apply_enrichment writes them ONLY
# through the amount gate (|deed − price|/price ≤ 3%, or no-price + ≤60d).
on:
  schedule:
    - cron: "43 11 * * 0"
  workflow_dispatch:

concurrency:
  group: skyline-enrichment
  cancel-in-progress: false

# The app lives under skyline/ in this repository.
defaults:
  run:
    working-directory: skyline

jobs:
  enrichment:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_LEGACY_WORKER == 'true'
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Require DATABASE_URL secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::The DATABASE_URL repo secret is not set. Add it under Settings → Secrets and variables → Actions → New repository secret. Use the SESSION POOLER connection string from the Supabase dashboard (Connect button) — the direct db.*.supabase.co host is IPv6-only and unreachable from Actions runners."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install worker deps
        run: pip install -r requirements.txt

      # phase2_stages.run() does legals → deed masters → match, then applies each
      # match through apply_enrichment.apply_fill → store.apply_acris_party_fill
      # (THE AMOUNT GATE; the acris_requires_gate DB CHECK makes bypass impossible).
      # One Postgres-native step. Covered by worker/test_phase2_enrichment.py.
      - name: Phase 2 enrichment — match missing parties → amount-gated fill
        run: python -m worker.phase2_stages

      - name: Alert on failure
        if: failure()
        run: |
          if [ -n "$ALERT_WEBHOOK_URL" ]; then
            curl -s -X POST "$ALERT_WEBHOOK_URL" -H 'Content-Type: application/json' \
              -d "{\"text\":\"Skyline weekly-enrichment FAILED: run ${{ github.run_id }}\"}" || true
          fi
