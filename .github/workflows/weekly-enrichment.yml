name: weekly-enrichment-manual-fallback

# Manual emergency fallback only. Production enrichment scheduling must not use
# GitHub Actions minutes.
on:
  workflow_dispatch:

concurrency:
  group: skyline-enrichment-manual
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    working-directory: skyline

jobs:
  enrichment:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL || secrets.DATABASE_URL }}
      SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Require database connection secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Neither SUPABASE_DB_URL nor DATABASE_URL is set."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install worker dependencies
        run: pip install -r requirements.txt

      - name: Run proven amount-gated phase 2 enrichment
        run: python -m worker.phase2_stages

      - name: Verify amount gate
        working-directory: ..
        run: |
          python - <<'PY'
          import os, psycopg
          conn = psycopg.connect(os.environ["DATABASE_URL"])
          with conn, conn.cursor() as cur:
              cur.execute("select count(*) from sbi_deal_parties dp join sbi_deals d using(deal_id) where dp.source_system='acris' and dp.role in ('buyer','seller') and coalesce(dp.amount_gate_passed,false) is not true")
              failures = cur.fetchone()[0]
              print("acris_parties_without_gate", failures)
              if failures:
                  raise SystemExit(f"amount gate failed: {failures}")
          PY
