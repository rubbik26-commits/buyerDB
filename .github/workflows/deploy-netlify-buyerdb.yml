name: deploy-netlify-buyerdb

on:
  workflow_dispatch:
  push:
    branches: [ACRIS]
    paths:
      - "skyline/frontend/**"
      - "skyline/database/migrations/**"
      - ".github/workflows/deploy-netlify-buyerdb.yml"

permissions:
  contents: read

concurrency:
  group: netlify-buyerdb-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skyline/frontend
    env:
      NETLIFY_SITE_ID: e1780534-ba0b-470e-b98f-85b29f7d32a1
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      VITE_API_URL: ${{ vars.VITE_API_URL || 'https://pdvyuepsdnpxctmagdcq.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skyline/frontend/package-lock.json
      - name: Install
        run: npm install
      - name: Build
        run: npm run build
      - name: Deploy to Netlify production
        run: npx netlify-cli deploy --prod --dir=dist --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
